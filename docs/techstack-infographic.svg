<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="t d">
  <title id="t">Nexus Tech Stack</title>
  <desc id="d">Technology stack by module for Nexus.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="60%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="headerLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0284C7"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <!-- Card fills -->
    <linearGradient id="gc1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C2340"/>
      <stop offset="100%" stop-color="#070F1C"/>
    </linearGradient>
    <linearGradient id="gc2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#0D1830"/>
    </linearGradient>
    <linearGradient id="gc3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#052E2B"/>
      <stop offset="100%" stop-color="#031A18"/>
    </linearGradient>
    <linearGradient id="gc4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D0F20"/>
      <stop offset="100%" stop-color="#1A0912"/>
    </linearGradient>
    <linearGradient id="gc5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A1700"/>
      <stop offset="100%" stop-color="#170E00"/>
    </linearGradient>
    <!-- Shared infra card -->
    <linearGradient id="gcShared" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1040"/>
      <stop offset="100%" stop-color="#0F0920"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="760" fill="url(#bg)" rx="24"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#fff" opacity="0.03"/>
  </pattern>
  <rect width="1400" height="760" fill="url(#dots)" rx="24"/>

  <!-- Header -->
  <text x="700" y="66" text-anchor="middle" fill="#E5E7EB" font-size="44" font-family="Segoe UI, Arial" font-weight="700" letter-spacing="3">TECH STACK MAP</text>
  <text x="700" y="98" text-anchor="middle" fill="#9CA3AF" font-size="17" font-family="Segoe UI, Arial">Purpose-built stacks for each product surface</text>
  <rect x="300" y="114" width="800" height="2" rx="1" fill="url(#headerLine)" opacity="0.65"/>

  <!-- ────────────────────────────────────────
       ROW 1 — three app cards
  ──────────────────────────────────────── -->

  <!-- Card 1: Child App -->
  <rect x="50" y="138" width="400" height="270" rx="18" fill="url(#gc1)" stroke="#38BDF8" stroke-width="1.5" filter="url(#shadow)"/>
