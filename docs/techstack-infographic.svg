  <text x="775" y="504" fill="#64748B" font-size="12" font-family="Segoe UI, Arial">Public brand + onboarding surface</text>
  <rect x="680" y="520" width="380" height="1" fill="#3D2100"/>
  <rect x="680" y="534" width="70" height="26" rx="13" fill="#1C1000" stroke="#F59E0B" stroke-width="1"/>
