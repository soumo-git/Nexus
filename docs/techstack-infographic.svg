  <rect x="946" y="534" width="90" height="26" rx="13" fill="#1C1000" stroke="#F59E0B" stroke-width="1"/>
  <text x="991" y="551" text-anchor="middle" fill="#FCD34D" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Three.js</text>
  <rect x="680" y="570" width="60" height="26" rx="13" fill="#1C1000" stroke="#F59E0B" stroke-width="1"/>
  <text x="710" y="587" text-anchor="middle" fill="#FCD34D" font-size="11" font-family="Segoe UI, Arial" font-weight="600">GSAP</text>
