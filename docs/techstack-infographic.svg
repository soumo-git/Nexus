  <rect x="70" y="218" width="360" height="1" fill="#1E3A5F"/>
  <!-- Tech tags -->
  <rect x="70" y="232" width="90" height="26" rx="13" fill="#0B1F3A" stroke="#38BDF8" stroke-width="1"/>
  <text x="115" y="249" text-anchor="middle" fill="#7DD3FC" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Kotlin</text>
  <rect x="172" y="232" width="120" height="26" rx="13" fill="#0B1F3A" stroke="#38BDF8" stroke-width="1"/>
  <text x="232" y="249" text-anchor="middle" fill="#7DD3FC" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Android SDK</text>
  <rect x="304" y="232" width="80" height="26" rx="13" fill="#0B1F3A" stroke="#38BDF8" stroke-width="1"/>
  <text x="344" y="249" text-anchor="middle" fill="#7DD3FC" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Gradle</text>
  <rect x="70" y="268" width="140" height="26" rx="13" fill="#0B1F3A" stroke="#38BDF8" stroke-width="1"/>
  <text x="140" y="285" text-anchor="middle" fill="#7DD3FC" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Firebase Realtime DB</text>
  <rect x="222" y="268" width="80" height="26" rx="13" fill="#0B1F3A" stroke="#38BDF8" stroke-width="1"/>
  <text x="262" y="285" text-anchor="middle" fill="#7DD3FC" font-size="11" font-family="Segoe UI, Arial" font-weight="600">WebRTC</text>
  <!-- Description -->
  <rect x="70" y="310" width="360" height="1" fill="#1E3A5F"/>
  <text x="70" y="332" fill="#94A3B8" font-size="12" font-family="Segoe UI, Arial">Data capture · Remote commands · Stealth mode</text>
  <text x="70" y="352" fill="#94A3B8" font-size="12" font-family="Segoe UI, Arial">Foreground service · Reboot persistence</text>
  <text x="70" y="372" fill="#94A3B8" font-size="12" font-family="Segoe UI, Arial">WebRTC DataChannel + media streaming</text>

  <!-- Card 2: Parent Android -->
  <rect x="500" y="138" width="400" height="270" rx="18" fill="url(#gc2)" stroke="#60A5FA" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="500" y="138" width="400" height="5" rx="2.5" fill="#60A5FA"/>
  <circle cx="550" cy="190" r="28" fill="#0F1E40" stroke="#60A5FA" stroke-width="1.5" filter="url(#glow)"/>
  <text x="550" y="198" text-anchor="middle" fill="#60A5FA" font-size="24" font-family="Segoe UI, Arial">👨‍👩‍👧</text>
  <text x="610" y="180" fill="#DBEAFE" font-size="22" font-family="Segoe UI, Arial" font-weight="700">Parent Android</text>
