  <rect x="970" y="268" width="100" height="26" rx="13" fill="#041E1B" stroke="#34D399" stroke-width="1"/>
  <text x="1020" y="285" text-anchor="middle" fill="#6EE7B7" font-size="11" font-family="Segoe UI, Arial" font-weight="600">JavaScript</text>
  <rect x="1082" y="268" width="80" height="26" rx="13" fill="#041E1B" stroke="#34D399" stroke-width="1"/>
  <text x="1122" y="285" text-anchor="middle" fill="#6EE7B7" font-size="11" font-family="Segoe UI, Arial" font-weight="600">WebRTC</text>
  <rect x="970" y="310" width="360" height="1" fill="#0A3A2E"/>
