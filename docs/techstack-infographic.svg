  <text x="565" y="249" text-anchor="middle" fill="#93C5FD" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Kotlin</text>
  <rect x="622" y="232" width="80" height="26" rx="13" fill="#0F1E40" stroke="#60A5FA" stroke-width="1"/>
  <text x="662" y="249" text-anchor="middle" fill="#93C5FD" font-size="11" font-family="Segoe UI, Arial" font-weight="600">XML UI</text>
  <rect x="714" y="232" width="80" height="26" rx="13" fill="#0F1E40" stroke="#60A5FA" stroke-width="1"/>
  <text x="754" y="249" text-anchor="middle" fill="#93C5FD" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Gradle</text>
  <rect x="520" y="268" width="100" height="26" rx="13" fill="#0F1E40" stroke="#60A5FA" stroke-width="1"/>
  <text x="570" y="285" text-anchor="middle" fill="#93C5FD" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Firebase</text>
  <rect x="632" y="268" width="80" height="26" rx="13" fill="#0F1E40" stroke="#60A5FA" stroke-width="1"/>
