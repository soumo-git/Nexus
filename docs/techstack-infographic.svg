  <text x="680" y="636" fill="#94A3B8" font-size="12" font-family="Segoe UI, Arial">3D animated hero · smooth scroll</text>
  <text x="680" y="656" fill="#94A3B8" font-size="12" font-family="Segoe UI, Arial">Static deployment · no build step</text>

  <!-- ── Shared Infrastructure footer bar ── -->
  <rect x="50" y="710" width="1300" height="32" rx="10" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
  <text x="700" y="731" text-anchor="middle" fill="#64748B" font-size="13" font-family="Segoe UI, Arial">Shared:  <tspan fill="#38BDF8" font-weight="600">Firebase Realtime DB</tspan>  ·  <tspan fill="#34D399" font-weight="600">WebRTC (libwebrtc)</tspan>  ·  <tspan fill="#A78BFA" font-weight="600">DTLS/SRTP encryption</tspan>  ·  <tspan fill="#F472B6" font-weight="600">Firebase Auth</tspan>  ·  <tspan fill="#F59E0B" font-weight="600">Google STUN</tspan></text>
</svg>
