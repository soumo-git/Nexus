  <rect x="762" y="534" width="60" height="26" rx="13" fill="#1C1000" stroke="#F59E0B" stroke-width="1"/>
  <text x="792" y="551" text-anchor="middle" fill="#FCD34D" font-size="11" font-family="Segoe UI, Arial" font-weight="600">CSS3</text>
  <rect x="834" y="534" width="100" height="26" rx="13" fill="#1C1000" stroke="#F59E0B" stroke-width="1"/>
