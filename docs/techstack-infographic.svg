  <rect x="200" y="440" width="420" height="5" rx="2.5" fill="#F472B6"/>
  <circle cx="255" cy="492" r="28" fill="#1F0A14" stroke="#F472B6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="255" y="500" text-anchor="middle" fill="#F472B6" font-size="24" font-family="Segoe UI, Arial">✉</text>
  <text x="315" y="482" fill="#FBCFE8" font-size="22" font-family="Segoe UI, Arial" font-weight="700">Email Service</text>
  <text x="315" y="504" fill="#64748B" font-size="12" font-family="Segoe UI, Arial">OTP · password reset · backend API</text>
  <rect x="220" y="520" width="380" height="1" fill="#4A1530"/>
  <rect x="220" y="534" width="90" height="26" rx="13" fill="#1F0A14" stroke="#F472B6" stroke-width="1"/>
