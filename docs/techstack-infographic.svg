  <text x="970" y="352" fill="#94A3B8" font-size="12" font-family="Segoe UI, Arial">Live camera/mic/screen feeds</text>
  <text x="970" y="372" fill="#94A3B8" font-size="12" font-family="Segoe UI, Arial">File browser · SMS · Location map</text>

