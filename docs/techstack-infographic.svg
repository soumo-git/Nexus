  <rect x="220" y="570" width="110" height="26" rx="13" fill="#1F0A14" stroke="#F472B6" stroke-width="1"/>
  <text x="275" y="587" text-anchor="middle" fill="#F9A8D4" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Brevo API</text>
  <rect x="220" y="614" width="380" height="1" fill="#4A1530"/>
  <text x="220" y="636" fill="#94A3B8" font-size="12" font-family="Segoe UI, Arial">Transactional email delivery · REST API</text>
  <text x="220" y="656" fill="#94A3B8" font-size="12" font-family="Segoe UI, Arial">Firebase auth integration · env-based config</text>

  <!-- Card 5: Landing Site -->
  <rect x="660" y="440" width="420" height="250" rx="18" fill="url(#gc5)" stroke="#F59E0B" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="660" y="440" width="420" height="5" rx="2.5" fill="#F59E0B"/>
  <circle cx="715" cy="492" r="28" fill="#1C1000" stroke="#F59E0B" stroke-width="1.5" filter="url(#glow)"/>
  <text x="715" y="500" text-anchor="middle" fill="#F59E0B" font-size="24" font-family="Segoe UI, Arial">🌐</text>
