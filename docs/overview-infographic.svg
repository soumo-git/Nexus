<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="580" viewBox="0 0 1400 580" role="img" aria-labelledby="t d">
  <title id="t">Nexus Overview</title>
  <desc id="d">Overview infographic for Nexus platform modules.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="60%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="headerPill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0284C7"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="connLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4ADE80" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Per-card gradients -->
    <linearGradient id="gChild" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C2340"/>
      <stop offset="100%" stop-color="#070F1C"/>
    </linearGradient>
    <linearGradient id="gMobile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#0D1830"/>
    </linearGradient>
    <linearGradient id="gDesktop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#052E2B"/>
      <stop offset="100%" stop-color="#031A18"/>
    </linearGradient>
    <linearGradient id="gEmail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D0F20"/>
      <stop offset="100%" stop-color="#1A0912"/>
    </linearGradient>
    <linearGradient id="gLanding" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A1700"/>
      <stop offset="100%" stop-color="#170E00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="580" fill="url(#bg)" rx="24"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#FFFFFF" opacity="0.04"/>
  </pattern>
  <rect width="1400" height="580" fill="url(#dots)" rx="24"/>

  <!-- Header -->
  <text x="700" y="68" text-anchor="middle" fill="#E5E7EB" font-size="46" font-family="Segoe UI, Arial" font-weight="700" letter-spacing="3">NEXUS OVERVIEW</text>
  <text x="700" y="100" text-anchor="middle" fill="#9CA3AF" font-size="17" font-family="Segoe UI, Arial">Multi-application parental control platform · 5 modules · 1 unified system</text>

  <!-- Header pill -->
  <rect x="490" y="116" width="420" height="36" rx="18" fill="url(#headerPill)" opacity="0.9"/>
  <text x="700" y="139" text-anchor="middle" fill="#fff" font-size="14" font-family="Segoe UI, Arial" font-weight="700" letter-spacing="2">5 CORE MODULES · 1 UNIFIED SYSTEM</text>

  <!-- Connector line between cards -->
  <line x1="170" y1="350" x2="1230" y2="350" stroke="url(#connLine)" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- ── Card 1: Child Agent ── -->
  <rect x="55" y="175" width="230" height="320" rx="18" fill="url(#gChild)" stroke="#38BDF8" stroke-width="1.5" filter="url(#cardShadow)"/>
  <!-- top accent -->
  <rect x="55" y="175" width="230" height="5" rx="2" fill="#38BDF8"/>
  <!-- icon circle -->
  <circle cx="170" cy="248" r="36" fill="#0B1F3A" stroke="#38BDF8" stroke-width="1.5" filter="url(#glow)"/>
  <text x="170" y="258" text-anchor="middle" fill="#38BDF8" font-size="28" font-family="Segoe UI, Arial">📱</text>
  <text x="170" y="310" text-anchor="middle" fill="#BAE6FD" font-size="19" font-family="Segoe UI, Arial" font-weight="700">Child Agent</text>
  <text x="170" y="334" text-anchor="middle" fill="#64748B" font-size="12" font-family="Segoe UI, Arial">Android telemetry</text>
  <text x="170" y="352" text-anchor="middle" fill="#64748B" font-size="12" font-family="Segoe UI, Arial">capture + control</text>
  <!-- chip -->
  <rect x="90" y="420" width="160" height="26" rx="13" fill="#0B1F3A" stroke="#38BDF8" stroke-width="1"/>
  <text x="170" y="437" text-anchor="middle" fill="#7DD3FC" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Kotlin · Android SDK</text>
  <!-- connector dot -->
  <circle cx="170" cy="350" r="6" fill="#38BDF8" filter="url(#glow)"/>

  <!-- ── Card 2: Parent Mobile ── -->
  <rect x="315" y="175" width="230" height="320" rx="18" fill="url(#gMobile)" stroke="#60A5FA" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="315" y="175" width="230" height="5" rx="2" fill="#60A5FA"/>
  <circle cx="430" cy="248" r="36" fill="#0F1E40" stroke="#60A5FA" stroke-width="1.5" filter="url(#glow)"/>
  <text x="430" y="258" text-anchor="middle" fill="#60A5FA" font-size="28" font-family="Segoe UI, Arial">👨‍👩‍👧</text>
  <text x="430" y="310" text-anchor="middle" fill="#DBEAFE" font-size="19" font-family="Segoe UI, Arial" font-weight="700">Parent Mobile</text>
  <text x="430" y="334" text-anchor="middle" fill="#64748B" font-size="12" font-family="Segoe UI, Arial">Android supervision</text>
  <text x="430" y="352" text-anchor="middle" fill="#64748B" font-size="12" font-family="Segoe UI, Arial">dashboard</text>
  <rect x="350" y="420" width="160" height="26" rx="13" fill="#0F1E40" stroke="#60A5FA" stroke-width="1"/>
  <text x="430" y="437" text-anchor="middle" fill="#93C5FD" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Kotlin · Firebase · WebRTC</text>
  <circle cx="430" cy="350" r="6" fill="#60A5FA" filter="url(#glow)"/>

  <!-- ── Card 3: Parent Desktop ── -->
  <rect x="575" y="175" width="250" height="320" rx="18" fill="url(#gDesktop)" stroke="#34D399" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="575" y="175" width="250" height="5" rx="2" fill="#34D399"/>
  <circle cx="700" cy="248" r="36" fill="#041E1B" stroke="#34D399" stroke-width="1.5" filter="url(#glow)"/>
  <text x="700" y="258" text-anchor="middle" fill="#34D399" font-size="28" font-family="Segoe UI, Arial">🖥</text>
  <text x="700" y="310" text-anchor="middle" fill="#D1FAE5" font-size="19" font-family="Segoe UI, Arial" font-weight="700">Parent Desktop</text>
  <text x="700" y="334" text-anchor="middle" fill="#64748B" font-size="12" font-family="Segoe UI, Arial">Electron command</text>
  <text x="700" y="352" text-anchor="middle" fill="#64748B" font-size="12" font-family="Segoe UI, Arial">and control UI</text>
  <rect x="620" y="420" width="160" height="26" rx="13" fill="#041E1B" stroke="#34D399" stroke-width="1"/>
  <text x="700" y="437" text-anchor="middle" fill="#6EE7B7" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Electron · Node.js · JS</text>
  <circle cx="700" cy="350" r="6" fill="#34D399" filter="url(#glow)"/>

  <!-- ── Card 4: Email Service ── -->
  <rect x="855" y="175" width="230" height="320" rx="18" fill="url(#gEmail)" stroke="#F472B6" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="855" y="175" width="230" height="5" rx="2" fill="#F472B6"/>
  <circle cx="970" cy="248" r="36" fill="#1F0A14" stroke="#F472B6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="970" y="258" text-anchor="middle" fill="#F472B6" font-size="28" font-family="Segoe UI, Arial">✉</text>
  <text x="970" y="310" text-anchor="middle" fill="#FBCFE8" font-size="19" font-family="Segoe UI, Arial" font-weight="700">Email Service</text>
  <text x="970" y="334" text-anchor="middle" fill="#64748B" font-size="12" font-family="Segoe UI, Arial">OTP delivery</text>
  <text x="970" y="352" text-anchor="middle" fill="#64748B" font-size="12" font-family="Segoe UI, Arial">password reset API</text>
  <rect x="895" y="420" width="150" height="26" rx="13" fill="#1F0A14" stroke="#F472B6" stroke-width="1"/>
  <text x="970" y="437" text-anchor="middle" fill="#F9A8D4" font-size="11" font-family="Segoe UI, Arial" font-weight="600">Node.js · Brevo API</text>
  <circle cx="970" cy="350" r="6" fill="#F472B6" filter="url(#glow)"/>

  <!-- ── Card 5: Landing ── -->
  <rect x="1115" y="175" width="230" height="320" rx="18" fill="url(#gLanding)" stroke="#F59E0B" stroke-width="1.5" filter="url(#cardShadow)"/>
  <rect x="1115" y="175" width="230" height="5" rx="2" fill="#F59E0B"/>
  <circle cx="1230" cy="248" r="36" fill="#1C1000" stroke="#F59E0B" stroke-width="1.5" filter="url(#glow)"/>
  <text x="1230" y="258" text-anchor="middle" fill="#F59E0B" font-size="28" font-family="Segoe UI, Arial">🌐</text>
  <text x="1230" y="310" text-anchor="middle" fill="#FDE68A" font-size="19" font-family="Segoe UI, Arial" font-weight="700">Landing Site</text>
  <text x="1230" y="334" text-anchor="middle" fill="#64748B" font-size="12" font-family="Segoe UI, Arial">Brand and</text>
  <text x="1230" y="352" text-anchor="middle" fill="#64748B" font-size="12" font-family="Segoe UI, Arial">onboarding</text>
  <rect x="1155" y="420" width="150" height="26" rx="13" fill="#1C1000" stroke="#F59E0B" stroke-width="1"/>
  <text x="1230" y="437" text-anchor="middle" fill="#FCD34D" font-size="11" font-family="Segoe UI, Arial" font-weight="600">HTML · Three.js · GSAP</text>
  <circle cx="1230" cy="350" r="6" fill="#F59E0B" filter="url(#glow)"/>

  <!-- Footer: Firebase + WebRTC bar -->
  <rect x="200" y="520" width="1000" height="40" rx="12" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="700" y="545" text-anchor="middle" fill="#94A3B8" font-size="13" font-family="Segoe UI, Arial">Shared infrastructure: <tspan fill="#38BDF8" font-weight="600">Firebase Realtime Database</tspan>  ·  <tspan fill="#34D399" font-weight="600">WebRTC P2P</tspan>  ·  <tspan fill="#F59E0B" font-weight="600">DTLS/SRTP Encryption</tspan></text>
</svg>
